<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dagens skema</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    min-height: 100vh;
    overflow: hidden;
}

body {
    font-family: Arial, sans-serif;
    background: #007BFF;
    color: white;
    text-align: center;
}

.page-layout {
    height: 100vh;
    width: 100vw;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 220px;
    gap: 12px;
    align-items: stretch;
    padding: 10px;
    box-sizing: border-box;
}

.main-content {
    min-width: 0;
    height: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.side-panel {
    width: 220px;
    height: 100%;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.clock {
    background: rgba(255,255,255,0.2);
    padding: 10px;
    border-radius: 12px;
    cursor: pointer;
    margin-bottom: 0;
    flex-shrink: 0;
}

.clock.manual {
    background: rgba(255,200,0,0.4);
}

#clockTime {
    font-size: clamp(2em, 5vw, 3em);
    line-height: 1;
    font-weight: bold;
}

#clockMode {
    font-size: 0.9em;
    margin-top: 4px;
}

button {
    margin: 4px;
    padding: 8px 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.add-alarm-btn {
    width: 100%;
    font-weight: bold;
    margin: 0;
    flex-shrink: 0;
}

.alarm-box {
    background: rgba(255,255,255,0.16);
    border-radius: 12px;
    padding: 8px;
    overflow: auto;
    flex: 1;
    min-height: 0;
}

.alarm-box h3 {
    margin: 2px 0 8px 0;
    font-size: 0.95em;
}

.alarm-box p {
    margin: 6px 0;
    font-size: 0.85em;
}

.alarm-item {
    background: rgba(255,255,255,0.22);
    margin: 5px 0;
    padding: 7px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 6px;
    font-size: 0.82em;
}

.alarm-item span {
    text-align: left;
}

.alarm-item button {
    margin: 0;
    padding: 4px 7px;
}

table {
    width: 100%;
    flex: 1;
    min-height: 0;
    border-collapse: collapse;
    background: rgba(255,255,255,0.08);
    overflow: hidden;
    border-radius: 12px;
    table-layout: fixed;
}

th, td {
    border: 1px solid rgba(255,255,255,0.5);
    padding: 6px;
    vertical-align: middle;
}

th {
    background: rgba(0,0,0,0.18);
}

.title-cell {
    font-size: clamp(1.35em, 3.2vw, 2.05em);
    font-weight: bold;
    height: 42px;
}

.time-cell {
    width: 115px;
    font-weight: bold;
    background: rgba(0,0,0,0.15);
    font-size: clamp(1em, 2vw, 1.25em);
}

.activity-cell {
    padding: 0;
    height: calc((100vh - 110px) / 5);
}

.activity-box {
    padding: 10px 8px;
    margin: 0;
    border-radius: 0;
    color: #111;
    font-weight: bold;
    line-height: 1.18;
    min-height: 100%;
    height: 100%;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: center;
    font-size: clamp(1.1em, 2.3vw, 1.55em);
}

.activity-box + .activity-box {
    border-top: 1px solid rgba(0,0,0,0.18);
    min-height: 50%;
    height: 50%;
}

.activity-cell .activity-box:first-child:nth-last-child(2),
.activity-cell .activity-box:first-child:nth-last-child(2) ~ .activity-box {
    min-height: 50%;
    height: 50%;
}

.activity-box small {
    display: block;
    font-weight: normal;
    margin-top: 4px;
    font-size: 0.72em;
}

.type-puslespil { background: #d9c2ff; }
.type-matematik { background: #b9f6ca; }
.type-krea { background: #ffd59e; }
.type-praktisk { background: #b7dcff; }
.type-historie { background: #f3b3a6; }
.type-friday { background: #ffb6d9; }
.type-pause { background: #e0e0e0; }
.type-bus { background: #fff3a6; }
.type-default { background: #ffffff; }

.note {
    margin: 0;
    background: rgba(255,255,255,0.16);
    border-radius: 12px;
    padding: 9px 12px;
    font-size: clamp(0.9em, 1.6vw, 1.05em);
    flex-shrink: 0;
}

.popup {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.popup-box {
    background: white;
    color: black;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    max-width: 90%;
    min-width: 280px;
}

#alarmPopup .popup-box {
    width: 90vw;
    max-width: 900px;
    min-height: 520px;
    padding: 50px;
    border-radius: 28px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    box-sizing: border-box;
}

#alarmPopup h2 {
    font-size: 4.5em;
    margin: 0 0 25px 0;
}

#alarmText {
    font-size: 2.2em;
    font-weight: bold;
    margin: 0 0 25px 0;
}

.next-lesson-box {
    margin-top: 15px;
    padding: 30px;
    border-radius: 20px;
    background: #fff3a6;
    color: #111;
    width: 100%;
    box-sizing: border-box;
    font-weight: bold;
    line-height: 1.35;
}

.next-lesson-box div:first-child {
    font-size: 2em;
    margin-bottom: 15px;
}

#nextLessonText {
    font-size: 1.8em;
    line-height: 1.5;
}

#alarmPopup button {
    font-size: 2em;
    padding: 18px 40px;
    border-radius: 18px;
    margin-top: 30px;
}

input, select {
    padding: 8px;
    margin: 5px;
    width: 90%;
    max-width: 260px;
    box-sizing: border-box;
}

.admin-btn {
    width: 100%;
    font-weight: bold;
    margin: 0;
    flex-shrink: 0;
    background: #222;
    color: white;
}

.admin-popup-box {
    width: 94vw;
    max-width: 1100px;
    height: 88vh;
    overflow: auto;
    text-align: left;
}

.admin-actions {
    position: sticky;
    top: 0;
    background: white;
    padding-bottom: 10px;
    z-index: 2;
    border-bottom: 1px solid #ddd;
}

.admin-row {
    display: grid;
    grid-template-columns: 130px 140px 1fr 1fr 130px 70px;
    gap: 6px;
    align-items: center;
    border-bottom: 1px solid #ddd;
    padding: 8px 0;
}

.admin-row input,
.admin-row select {
    width: 100%;
    max-width: none;
    margin: 0;
}

.admin-row button {
    margin: 0;
}

@media (max-width: 800px) {
    .admin-row {
        grid-template-columns: 1fr;
        background: #f4f4f4;
        border-radius: 10px;
        padding: 10px;
        margin: 8px 0;
    }
}


@media (orientation: landscape) and (max-height: 750px) {
    .page-layout {
        grid-template-columns: minmax(0, 1fr) 200px;
        gap: 8px;
        padding: 8px;
    }

    .side-panel {
        width: 200px;
        gap: 6px;
    }

    .clock {
        padding: 8px;
    }

    #clockTime {
        font-size: 2.25em;
    }

    .title-cell {
        height: 36px;
    }

    th, td {
        padding: 4px;
    }

    .time-cell {
        width: 100px;
        font-size: 1em;
    }

    .activity-cell {
        height: calc((100vh - 96px) / 5);
    }

    .activity-box {
        padding: 7px 6px;
        font-size: clamp(1em, 2.1vw, 1.35em);
        line-height: 1.12;
    }

    .note {
        padding: 7px 10px;
        font-size: 0.9em;
    }

    .alarm-item {
        font-size: 0.78em;
        padding: 6px;
    }
}

@media (orientation: portrait), (max-width: 700px) {
    html, body {
        overflow: auto;
        height: auto;
    }

    .page-layout {
        height: auto;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 12px;
    }

    .side-panel {
        order: -1;
        width: 100%;
        max-width: 340px;
        height: auto;
        margin: 0 auto;
    }

    .main-content {
        height: auto;
    }

    table {
        flex: none;
    }

    .activity-cell {
        height: auto;
    }

    .activity-box {
        min-height: 70px;
        height: auto;
        font-size: 1.05em;
    }

    .time-cell {
        width: 95px;
    }

    .title-cell {
        font-size: 1.15em;
    }

    #alarmPopup .popup-box {
        min-height: 420px;
        padding: 30px;
    }

    #alarmPopup h2 {
        font-size: 3em;
    }

    #alarmText {
        font-size: 1.7em;
    }

    .next-lesson-box div:first-child {
        font-size: 1.5em;
    }

    #nextLessonText {
        font-size: 1.4em;
    }

    #alarmPopup button {
        font-size: 1.5em;
    }
}


/* NY OG MERE OVERSKUELIG ALARM-POPUP */
.alarm-settings-box {
    width: 520px;
    max-width: 95vw;
    padding: 28px;
    border-radius: 22px;
    box-sizing: border-box;
}

.alarm-settings-box h2 {
    margin: 0 0 22px 0;
    font-size: 2em;
}

.alarm-time-label {
    display: block;
    text-align: left;
    width: 100%;
    max-width: 360px;
    margin: 0 auto 6px auto;
    font-weight: bold;
}

.alarm-settings-box input[type="time"] {
    width: 100%;
    max-width: 360px;
    font-size: 1.4em;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #bbb;
}

.days-box {
    margin: 22px auto 0 auto;
    padding: 16px;
    border-radius: 16px;
    background: #f3f6fb;
    max-width: 420px;
    box-sizing: border-box;
}

.days-box h3 {
    margin: 0 0 14px 0;
    text-align: center;
}

.days-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    text-align: left;
}

.days-grid label {
    background: white;
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 12px;
    font-size: 1.05em;
    cursor: pointer;
}

.days-grid input[type="checkbox"] {
    width: auto;
    max-width: none;
    margin: 0 10px 0 0;
    transform: scale(1.35);
}

.day-buttons,
.action-buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 18px;
}

.day-buttons button {
    background: #eef4ff;
    color: #0b63d1;
    font-weight: bold;
    padding: 10px 14px;
}

.ok-btn,
.close-btn {
    min-width: 120px;
    font-size: 1.05em;
    font-weight: bold;
    padding: 12px 18px;
}

.ok-btn {
    background: #28a745;
    color: white;
}

.close-btn {
    background: #dc3545;
    color: white;
}

@media (max-width: 430px) {
    .days-grid {
        grid-template-columns: 1fr;
    }

    .alarm-settings-box {
        padding: 22px;
    }
}

<body>

</div>

            <div id="nextLessonText"></div>

    </div>
</div>

<div id="alarmSettingsPopup" class="popup">
    <div class="popup-box alarm-settings-box">
        <h2>⏰ Opret alarm</h2>

        <label class="alarm-time-label" for="alarmTime">Tidspunkt</label>
        <input type="time" id="alarmTime">

        <div class="days-box">
            <h3>Gentag på</h3>

            <div class="days-grid">
                <label><input type="checkbox" class="alarmDayCheck" value="0"> Mandag</label>
                <label><input type="checkbox" class="alarmDayCheck" value="1"> Tirsdag</label>
                <label><input type="checkbox" class="alarmDayCheck" value="2"> Onsdag</label>
                <label><input type="checkbox" class="alarmDayCheck" value="3"> Torsdag</label>
                <label><input type="checkbox" class="alarmDayCheck" value="4"> Fredag</label>
                <label><input type="checkbox" class="alarmDayCheck" value="5"> Lørdag</label>
                <label><input type="checkbox" class="alarmDayCheck" value="6"> Søndag</label>
            </div>
        </div>

        <div class="day-buttons">
            <button onclick="selectWeekdays()">📅 Hverdage</button>
            <button onclick="selectAllDays()">📅 Alle dage</button>
            <button onclick="clearAlarmDays()">🗑️ Ryd</button>
        </div>

        <div class="action-buttons">
            <button class="ok-btn" onclick="saveAlarmFromPopup()">✅ OK</button>
            <button class="close-btn" onclick="closeAlarmPopup()">❌ Luk</button>
        </div>

    </div>
</div>


<div id="adminPopup" class="popup">
    <div class="popup-box admin-popup-box">
        <div class="admin-actions">
            <h3>Rediger skema</h3>
            <p>Ret direkte i felterne. Tryk Gem, når du er færdig.</p>
            <button onclick="addAdminRow()">➕ Ny aktivitet</button>
            <button onclick="saveAdminSchedule()">✅ Gem skema</button>
            <button onclick="resetScheduleToStandard()">↩️ Nulstil</button>
            <button onclick="closeAdminPopup()">❌ Luk</button>
        </div>

        <div id="adminRows"></div>
    </div>
</div>

<div id="manualPopup" class="popup">
    <div class="popup-box">
        <h3>Indstil tid</h3>

        <input type="date" id="manualDate">
        <input type="time" id="manualTime">

        <br>
        <button onclick="setManualTime()">✅ OK</button>
        <button onclick="setNow()">⏱ Nu</button>
        <button onclick="closeManualPopup()">❌ Luk</button>

        <p id="errorText" style="color:red;"></p>
    </div>
</div>

<script>
const days = ["Mandag","Tirsdag","Onsdag","Torsdag","Fredag"];

let manual = false;
let manualBase = null;
let manualStart = null;

let alarms = [];
let audioCtx;
let alarmInterval;

const standardSchedule = [
    {
        time: "09.00-10.00",
        Mandag: [{ text: "Individuel opgave", note: "(Puslespil)", type: "puslespil" }],
        Tirsdag: [{ text: "Individuel opgave", note: "(Puslespil)", type: "puslespil" }],
        Onsdag: [{ text: "Individuel opgave", note: "(Puslespil)", type: "puslespil" }],
        Torsdag: [{ text: "Puslespil", type: "puslespil" }],
        Fredag: [
            { text: "Switch / fælles puslespil", note: "9.30-10.00", type: "friday" },
            { text: "Matematik", type: "matematik" }
        ]
    },
    {
        time: "10.00-11.30",
        Mandag: [
            { text: "KREA-værksted", note: "(Sanne og Bettina)", type: "krea" },
            { text: "Eller Matematik", type: "matematik" }
        ],
        Tirsdag: [{ text: "Matematik", type: "matematik" }],
        Onsdag: [
            { text: "Praktisk værksted", note: "(Peter)", type: "praktisk" },
            { text: "Eller Puslespil", type: "puslespil" }
        ],
        Torsdag: [{ text: "Historie & samfundsfag", note: "(Michael)", type: "historie" }],
        Fredag: [
            { text: "Friday Minds", note: "(brætspil, Switch & andet)", type: "friday" }
        ]
    },
    {
        time: "11.00-11.30",
        Mandag: [{ text: "Fællespause", note: "(Overetage - Peter)", type: "pause" }],
        Tirsdag: [{ text: "Fællespause", note: "(Underetage - Anja)", type: "pause" }],
        Onsdag: [{ text: "Fællespause", note: "(Overetage - Bettina)", type: "pause" }],
        Torsdag: [{ text: "Fællespause", note: "(Underetage - Michael)", type: "pause" }],
        Fredag: []
    },
    {
        time: "11.30-12.00",
        Mandag: [{ text: "Frokostpause", type: "pause" }],
        Tirsdag: [{ text: "Frokostpause", type: "pause" }],
        Onsdag: [{ text: "Frokostpause", type: "pause" }],
        Torsdag: [{ text: "Frokostpause", type: "pause" }],
        Fredag: [{ text: "Frokost / gå til bussen kl. 11.50!", type: "bus" }]
    },
    {
        time: "12.20",
        Mandag: [{ text: "Gøre klar og gå til bussen!", type: "bus" }],
        Tirsdag: [{ text: "Gøre klar og gå til bussen!", type: "bus" }],
        Onsdag: [{ text: "Gøre klar og gå til bussen!", type: "bus" }],
        Torsdag: [{ text: "Gøre klar og gå til bussen!", type: "bus" }],
        Fredag: []
    }
];

let schedule = loadSchedule();

function startAlarmSound() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    alarmInterval = setInterval(() => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "sine";
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.25, audioCtx.currentTime);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
    }, 600);
}

function saveAlarms() {
    localStorage.setItem("alarms", JSON.stringify(alarms));
}

function loadAlarms() {
    const data = localStorage.getItem("alarms");
    if (data) {
        alarms = JSON.parse(data);
    }
}

function formatTime(d) {
    return d.toTimeString().slice(0,5);
}

function formatDate(d) {
    return d.toISOString().split("T")[0];
}

function formatDateTitle(d) {
    const weekday = d.toLocaleDateString("da-DK", { weekday: "long" });
    const day = d.getDate();
    const month = d.toLocaleDateString("da-DK", { month: "long" });
    const year = d.getFullYear();

    return capitalizeFirstLetter(`${weekday} d. ${day}. ${month} ${year}`);
}

function capitalizeFirstLetter(text) {
    return text.charAt(0).toUpperCase() + text.slice(1);
}

function escapeHtml(text) {
    if (!text) return "";
    return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function renderActivityBoxes(items) {
    if (!items || items.length === 0) return "";

    return items.map(item => {
        const cls = "type-" + (item.type || "default");
        const text = escapeHtml(item.text || "");
        const note = item.note ? `<small>${escapeHtml(item.note)}</small>` : "";
        return `<div class="activity-box ${cls}">${text}${note}</div>`;
    }).join("");
}

function createTable() {
    const t = document.getElementById("schedule");
    const now = getNow();
    const dayIndex = getWeekdayIndex(now);
    const dayName = dayIndex >= 0 && dayIndex < 5 ? days[dayIndex] : null;
    const title = formatDateTitle(now);

    if (!dayName) {
        t.innerHTML = `
            <tr>
                <th class="title-cell" colspan="2">${title}</th>
            </tr>
            <tr>
                <td colspan="2">Der er ikke noget hverdags-skema i dag.</td>
            </tr>
        `;
        return;
    }

    let html = `
        <tr>
            <th class="time-cell">Tid</th>
            <th class="title-cell">${title}</th>
        </tr>
    `;

    schedule.forEach(row => {
        if (!row[dayName] || row[dayName].length === 0) {
            return;
        }

        html += `
            <tr>
                <td class="time-cell">${row.time}</td>
                <td class="activity-cell">${renderActivityBoxes(row[dayName])}</td>
            </tr>
        `;
    });

    t.innerHTML = html;
}

function getWeekdayIndex(date) {
    let d = date.getDay();
    if (d === 0 || d === 6) return -1;
    return d - 1;
}

function getWeekdayIndexForAlarm(date) {
    const d = date.getDay();

    if (d === 0) return 6; // Søndag
    return d - 1;          // Mandag = 0
}

function selectWeekdays() {
    document.querySelectorAll(".alarmDayCheck").forEach(cb => {
        cb.checked = Number(cb.value) >= 0 && Number(cb.value) <= 4;
    });
}

function selectAllDays() {
    document.querySelectorAll(".alarmDayCheck").forEach(cb => {
        cb.checked = true;
    });
}

function clearAlarmDays() {
    document.querySelectorAll(".alarmDayCheck").forEach(cb => {
        cb.checked = false;
    });
}

function getNow() {
    if (!manual) return new Date();
    const diff = new Date() - manualStart;
    return new Date(manualBase.getTime() + diff);
}

function timeStringToMinutes(timeText) {
    const cleanTime = timeText.split("-")[0].trim().replace(".", ":");
    const parts = cleanTime.split(":");

    const hours = Number(parts[0]);
    const minutes = Number(parts[1] || 0);

    return hours * 60 + minutes;
}

function getCurrentMinutes(date) {
    return date.getHours() * 60 + date.getMinutes();
}

function getNextLessonText(date) {
    const dayIndex = getWeekdayIndex(date);

    if (dayIndex < 0 || dayIndex > 4) {
        return "Der er ikke noget hverdags-skema i dag.";
    }

    const dayName = days[dayIndex];
    const nowMinutes = getCurrentMinutes(date);

    for (const row of schedule) {
        const rowStart = timeStringToMinutes(row.time);
        const lessons = row[dayName];

        if (rowStart >= nowMinutes && lessons && lessons.length > 0) {
            const lessonTexts = lessons.map(item => {
                let text = item.text || "";
                if (item.note) {
                    text += " " + item.note;
                }
                return text;
            }).join(" / ");

            return `${row.time}: ${lessonTexts}`;
        }
    }

    return "Der er ikke flere lektioner i dag.";
}

function updateClock() {
    const now = getNow();

    document.getElementById("clockTime").innerText = formatTime(now);
    document.getElementById("clockMode").innerText = manual ? "Manuel tid" : "Aktuel tid";
    document.getElementById("clock").classList.toggle("manual", manual);

    checkAlarms();
}

function openAlarmPopup() {
    const now = getNow();
    document.getElementById("alarmTime").value = formatTime(now);
    document.getElementById("alarmSettingsPopup").style.display = "flex";
}

function closeAlarmPopup() {
    document.getElementById("alarmSettingsPopup").style.display = "none";
    document.getElementById("alarmError").innerText = "";
}

function saveAlarmFromPopup() {
    const time = document.getElementById("alarmTime").value;
    const checkedDays = Array.from(document.querySelectorAll(".alarmDayCheck:checked"))
        .map(cb => Number(cb.value));

    if (!time) {
        document.getElementById("alarmError").innerText = "Vælg et tidspunkt.";
        return;
    }

    if (checkedDays.length === 0) {
        document.getElementById("alarmError").innerText = "Vælg mindst én ugedag.";
        return;
    }

    alarms.push({
        time,
        type: "weeklyCustom",
        days: checkedDays,
        lastTriggered: null
    });

    saveAlarms();
    renderAlarms();
    closeAlarmPopup();
}


function renderAlarms() {
    const list = document.getElementById("alarmList");
    const allDayNames = ["Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag","Søndag"];

    if (alarms.length === 0) {
        list.innerHTML = "<h3>Dine alarmer</h3><p>Ingen alarmer oprettet endnu.</p>";
        return;
    }

    list.innerHTML = "<h3>Dine alarmer</h3>";

    alarms.forEach((a, i) => {
        let label = "";

        if (a.type === "weeklyCustom") {
            const dayNames = (a.days || [])
                .map(d => allDayNames[Number(d)] || "")
                .filter(Boolean)
                .join(", ");

            label = `${dayNames} kl. ${a.time}`;
        } else if (a.type === "dag") {
            label = `Daglig kl. ${a.time}`;
        } else {
            label = `Ugentlig ${allDayNames[Number(a.day)] || ""} kl. ${a.time}`;
        }

        list.innerHTML += `
            <div class="alarm-item">
                <span>${label}</span>
                <button onclick="deleteAlarm(${i})">❌</button>
            </div>
        `;
    });
}


function deleteAlarm(i) {
    alarms.splice(i, 1);
    saveAlarms();
    renderAlarms();
}

function checkAlarms() {
    const nowDate = getNow();
    const nowTime = formatTime(nowDate);
    const weekdayIndex = getWeekdayIndexForAlarm(nowDate);
    const todayKey = formatDate(nowDate);

    alarms.forEach(a => {
        let shouldTrigger = false;

        if (a.type === "dag" && a.time === nowTime) {
            shouldTrigger = true;
        }

        if (a.type === "uge" && a.time === nowTime && Number(a.day) === weekdayIndex) {
            shouldTrigger = true;
        }

        if (a.type === "weeklyCustom" && a.time === nowTime && (a.days || []).includes(weekdayIndex)) {
            shouldTrigger = true;
        }

        const triggerKey = `${todayKey}_${nowTime}_${a.type}_${JSON.stringify(a.days || a.day || "")}`;

        if (shouldTrigger && a.lastTriggered !== triggerKey) {
            a.lastTriggered = triggerKey;
            saveAlarms();

            document.getElementById("alarmText").innerText = `Alarm sat til ${a.time}`;
            document.getElementById("nextLessonText").innerText = getNextLessonText(nowDate);
            document.getElementById("alarmPopup").style.display = "flex";

            startAlarmSound();

            // Stop automatisk efter 20 sekunder
            setTimeout(() => {
                stopAlarm();
            }, 20000);
        }
    });
}


function stopAlarm() {
    if (alarmInterval) clearInterval(alarmInterval);
    if (audioCtx) audioCtx.close();

    document.getElementById("alarmPopup").style.display = "none";
}

function openManualPopup() {
    const now = getNow();
    document.getElementById("manualDate").value = formatDate(now);
    document.getElementById("manualTime").value = formatTime(now);
    document.getElementById("manualPopup").style.display = "flex";
}

function closeManualPopup() {
    document.getElementById("manualPopup").style.display = "none";
    document.getElementById("errorText").innerText = "";
}

function setManualTime() {
    const date = document.getElementById("manualDate").value;
    const time = document.getElementById("manualTime").value;

    if (!date || !time) {
        document.getElementById("errorText").innerText = "Vælg både dato og tid.";
        return;
    }

    manualBase = new Date(date + "T" + time);
    manualStart = new Date();
    manual = true;

    closeManualPopup();
    createTable();
    updateClock();
}

function setNow() {
    manual = false;
    closeManualPopup();
    createTable();
    updateClock();
}


function cloneSchedule(data) {
    return JSON.parse(JSON.stringify(data));
}

function loadSchedule() {
    const data = localStorage.getItem("schedule");

    if (!data) {
        return cloneSchedule(standardSchedule);
    }

    try {
        return JSON.parse(data);
    } catch (err) {
        return cloneSchedule(standardSchedule);
    }
}

function saveSchedule() {
    localStorage.setItem("schedule", JSON.stringify(schedule));
}

function openAdminPopup() {
    renderAdminRows();
    document.getElementById("adminPopup").style.display = "flex";
}

function closeAdminPopup() {
    document.getElementById("adminPopup").style.display = "none";
}

function makeAdminRow(time, day, text, note, type) {
    const div = document.createElement("div");
    div.className = "admin-row";

    div.innerHTML = `
        <input class="admin-time" value="${escapeHtml(time || "")}" placeholder="Tid fx 09.00-10.00">
        <select class="admin-day">
            ${days.map(d => `<option value="${d}" ${d === day ? "selected" : ""}>${d}</option>`).join("")}
        </select>
        <input class="admin-text" value="${escapeHtml(text || "")}" placeholder="Aktivitet">
        <input class="admin-note" value="${escapeHtml(note || "")}" placeholder="Note">
        <select class="admin-type">
            ${["puslespil","matematik","krea","praktisk","historie","friday","pause","bus","default"].map(t => `<option value="${t}" ${t === type ? "selected" : ""}>${t}</option>`).join("")}
        </select>
        <button onclick="this.parentElement.remove()">🗑️</button>
    `;

    return div;
}

function renderAdminRows() {
    const box = document.getElementById("adminRows");
    box.innerHTML = "";

    schedule.forEach(row => {
        days.forEach(day => {
            const items = row[day] || [];
            items.forEach(item => {
                box.appendChild(makeAdminRow(
                    row.time,
                    day,
                    item.text || "",
                    item.note || "",
                    item.type || "default"
                ));
            });
        });
    });
}

function addAdminRow() {
    const box = document.getElementById("adminRows");
    box.prepend(makeAdminRow("09.00-10.00", "Mandag", "", "", "default"));
}

function saveAdminSchedule() {
    const rows = document.querySelectorAll("#adminRows .admin-row");
    const map = new Map();

    rows.forEach(div => {
        const time = div.querySelector(".admin-time").value.trim();
        const day = div.querySelector(".admin-day").value;
        const text = div.querySelector(".admin-text").value.trim();
        const note = div.querySelector(".admin-note").value.trim();
        const type = div.querySelector(".admin-type").value;

        if (!time || !text) return;

        if (!map.has(time)) {
            const newRow = { time };
            days.forEach(d => newRow[d] = []);
            map.set(time, newRow);
        }

        const item = { text, type };
        if (note) item.note = note;

        map.get(time)[day].push(item);
    });

    schedule = Array.from(map.values()).sort((a, b) => {
        return timeStringToMinutes(a.time) - timeStringToMinutes(b.time);
    });

    saveSchedule();
    createTable();
    renderAdminRows();
    alert("Skemaet er gemt.");
}

function resetScheduleToStandard() {
    if (!confirm("Vil du nulstille skemaet til standardskemaet?")) return;

    localStorage.removeItem("schedule");
    schedule = cloneSchedule(standardSchedule);
    createTable();
    renderAdminRows();
}

loadAlarms();
createTable();
renderAlarms();
updateClock();

setInterval(() => {
    updateClock();

    const now = getNow();
    if (now.getSeconds() === 0) {
        createTable();
    }
}, 1000);
</script>
